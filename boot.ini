odroidgoa-uboot-config

########################################################################
# Changes made to this are overwritten every time there's a new upgrade
# To make your changes permanent change it on
# boot.ini.default
# After changing it on boot.ini.default run the bootini command to
# rewrite this file with your personal permanent settings.
########################################################################

# Boot Arguments
# NOTE: keep UUID unquoted to avoid passing literal quote chars to kernel.
setenv bootargs "root=UUID=e139ce78-9841-40fe-8823-96a304a09859 rootwait rw fsck.repair=yes net.ifnames=0 fbcon=rotate:0 console=/dev/ttyFIQ0 quiet splash plymouth.ignore-serial-consoles consoleblank=0"

# Booting
setenv loadaddr "0x02000000"
setenv initrd_loadaddr "0x01100000"
setenv dtb_loadaddr "0x01f00000"

load mmc 1:1 ${loadaddr} Image
load mmc 1:1 ${initrd_loadaddr} uInitrd

# R36S units ship with different screen panels.
# Try known DTB variants in order until one loads.
if load mmc 1:1 ${dtb_loadaddr} rk3326-r35s-linux.dtb; then
  echo "Loaded DTB: rk3326-r35s-linux.dtb"
elif load mmc 1:1 ${dtb_loadaddr} rk3326-rg351mp-linux.dtb; then
  echo "Loaded DTB: rk3326-rg351mp-linux.dtb"
elif load mmc 1:1 ${dtb_loadaddr} rk3326-rg351mp-linux.dtb.orig; then
  echo "Loaded DTB: rk3326-rg351mp-linux.dtb.orig"
elif load mmc 1:1 ${dtb_loadaddr} rk3326-rg351mp-linux.dtb.tony; then
  echo "Loaded DTB: rk3326-rg351mp-linux.dtb.tony"
else
  echo "ERROR: no compatible DTB found on BOOT partition"
fi

booti ${loadaddr} ${initrd_loadaddr} ${dtb_loadaddr}
